<div class="shell">

  <header class="app-header">
    <div class="header-inner">

      <a class="brand" routerLink="/dashboard">
        <svg class="brand-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect width="48" height="48" rx="11" fill="#006994"/>
          <rect x="11" y="14" width="26" height="4" rx="2" fill="white"/>
          <rect x="11" y="21.5" width="19" height="4" rx="2" fill="white" opacity="0.7"/>
          <path d="M11 33 C14 28.5 17 28.5 20 33 C23 37.5 26 37.5 29 33 C32 28.5 35 28.5 37 30.5"
                stroke="#00b4d8" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="brand-name">Survey Maker</span>
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a routerLink="/dashboard"     routerLinkActive="active">Dashboard</a>
        <a routerLink="/my-forms"      routerLinkActive="active">My Forms</a>
        <a routerLink="/create-form"   routerLinkActive="active">Create Form</a>
        <a routerLink="/my-surveys"    routerLinkActive="active">My Surveys</a>
        <a routerLink="/public-survey" routerLinkActive="active">Public Surveys</a>
      </nav>

      <div class="user-menu">
        <div class="user-avatar" [title]="user.name ?? user.email ?? ''">{{ initials }}</div>
        <span class="user-name">{{ user.name }}</span>
        <button class="btn btn-ghost sign-out-btn" (click)="signOut()">Sign Out</button>
      </div>

    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

</div>
