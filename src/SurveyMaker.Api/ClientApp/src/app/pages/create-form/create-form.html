<div class="page-wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title">Create New Form</h1>
      <p class="page-subtitle">Design your survey by adding questions below.</p>
    </div>
    <div style="display:flex;gap:0.75rem">
      <a routerLink="/my-forms" class="btn btn-outline">Cancel</a>
      <button class="btn btn-accent" disabled title="Save will be enabled once questions are added">Save Form</button>
    </div>
  </div>

  <!-- Form metadata -->
  <div class="card form-meta-card">
    <div class="field">
      <label class="field-label" for="form-title">Form Title <span class="required">*</span></label>
      <input
        id="form-title"
        class="field-input"
        type="text"
        placeholder="e.g. Customer Satisfaction Survey"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        maxlength="120"
      />
    </div>
    <div class="field">
      <label class="field-label" for="form-desc">Description <span class="optional">(optional)</span></label>
      <textarea
        id="form-desc"
        class="field-input field-textarea"
        placeholder="Briefly describe what this survey is about…"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        rows="3"
        maxlength="500"
      ></textarea>
    </div>
  </div>

  <!-- Question builder placeholder -->
  <div class="card question-builder">
    <div class="empty-state">
      <svg class="empty-icon" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="26" stroke="currentColor" stroke-width="2.5"/>
        <path d="M32 20 C32 20 28 24 28 28 C28 30.2 29.8 32 32 32 C34.2 32 36 33.8 36 36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="32" cy="42" r="2" fill="currentColor"/>
      </svg>
      <h3>No questions yet</h3>
      <p>Click a question type below to add your first question.</p>
    </div>

    <div class="question-types">
      <button class="q-type-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4zm14 5H2v6a2 2 0 002 2h12a2 2 0 002-2V9z" clip-rule="evenodd"/></svg>
        Short Answer
      </button>
      <button class="q-type-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M3 4a1 1 0 000 2h14a1 1 0 100-2H3zm0 4a1 1 0 000 2h14a1 1 0 100-2H3zm0 4a1 1 0 000 2h7a1 1 0 100-2H3z" clip-rule="evenodd"/></svg>
        Long Answer
      </button>
      <button class="q-type-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M10 3a1 1 0 01.707.293l3 3a1 1 0 01-1.414 1.414L10 5.414 7.707 7.707a1 1 0 01-1.414-1.414l3-3A1 1 0 0110 3zm-3.707 9.293a1 1 0 011.414 0L10 14.586l2.293-2.293a1 1 0 011.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Multiple Choice
      </button>
      <button class="q-type-btn" disabled>
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        Rating
      </button>
    </div>
    <p class="coming-soon">Question builder coming soon — add your form title and save to reserve your form.</p>
  </div>

</div>
