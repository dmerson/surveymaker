<div class="page-wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title">Create New Form</h1>
      <p class="page-subtitle">Give your form a name to get started.</p>
    </div>
    <div style="display:flex;gap:0.75rem">
      <a routerLink="/my-forms" class="btn btn-outline">Cancel</a>
      <button class="btn btn-accent" [disabled]="saving() || !title().trim()" (click)="create()">
        @if (saving()) { Saving… } @else { Create Form }
      </button>
    </div>
  </div>

  @if (error()) {
    <div class="error-banner">{{ error() }}</div>
  }

  <div class="card form-meta-card">
    <div class="field">
      <label class="field-label" for="form-title">Form Title <span class="required">*</span></label>
      <input id="form-title" class="field-input" type="text"
        placeholder="e.g. Customer Satisfaction Survey"
        [ngModel]="title()" (ngModelChange)="title.set($event)"
        maxlength="50" (keydown.enter)="create()" />
    </div>

    <div class="field">
      <label class="field-label" for="form-desc">Description <span class="optional">(optional)</span></label>
      <textarea id="form-desc" class="field-input field-textarea"
        placeholder="Briefly describe what this survey is about…"
        [ngModel]="description()" (ngModelChange)="description.set($event)"
        rows="3" maxlength="255"></textarea>
    </div>

    <div class="field">
      <label class="field-label">Who can take this survey?</label>
      <div class="radio-group">
        <label class="radio-option" [class.selected]="securityTypeId() === 1">
          <input type="radio" name="security" [value]="1"
            [ngModel]="securityTypeId()" (ngModelChange)="securityTypeId.set(+$event)" />
          <span class="radio-icon">🌐</span>
          <span class="radio-body">
            <strong>Public</strong>
            <span>Anyone can find and take this survey</span>
          </span>
        </label>
        <label class="radio-option" [class.selected]="securityTypeId() === 3">
          <input type="radio" name="security" [value]="3"
            [ngModel]="securityTypeId()" (ngModelChange)="securityTypeId.set(+$event)" />
          <span class="radio-icon">🔗</span>
          <span class="radio-body">
            <strong>URL Only</strong>
            <span>Only people with the link can take it</span>
          </span>
        </label>
        <label class="radio-option" [class.selected]="securityTypeId() === 2">
          <input type="radio" name="security" [value]="2"
            [ngModel]="securityTypeId()" (ngModelChange)="securityTypeId.set(+$event)" />
          <span class="radio-icon">🔒</span>
          <span class="radio-body">
            <strong>Private</strong>
            <span>Only specific people you invite</span>
          </span>
        </label>
      </div>
    </div>
  </div>
</div>
