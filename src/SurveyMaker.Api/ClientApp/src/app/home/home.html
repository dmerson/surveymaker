<div class="login-page">

  <!-- Decorative wave backdrop -->
  <div class="wave-backdrop" aria-hidden="true">
    <svg class="wave-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="rgba(0,180,216,0.18)"
        d="M0,192 C240,256 480,128 720,160 C960,192 1200,288 1440,224 L1440,320 L0,320 Z"/>
      <path fill="rgba(0,150,199,0.12)"
        d="M0,256 C360,192 720,320 1080,256 C1260,224 1380,240 1440,256 L1440,320 L0,320 Z"/>
    </svg>
  </div>

  <!-- Login card -->
  <div class="login-card">

    <div class="login-logo">
      <svg viewBox="0 0 56 56" fill="none" class="logo-icon">
        <rect width="56" height="56" rx="14" fill="#006994"/>
        <rect x="12" y="17" width="32" height="5" rx="2.5" fill="white"/>
        <rect x="12" y="26" width="23" height="5" rx="2.5" fill="white" opacity="0.7"/>
        <path d="M12 39 C16 34 20 34 24 39 C28 44 32 44 36 39 C40 34 44 34 46 36"
              stroke="#00b4d8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span class="logo-text">Survey Maker</span>
    </div>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to create surveys and view your responses.</p>

    @if (loading) {
      <div class="login-loading" aria-live="polite">
        <div class="spinner"></div>
        <span>Checking session…</span>
      </div>
    } @else {
      <button class="btn-google" (click)="signIn()">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    }

    <p class="login-footer">
      Your data is private. We only use your Google account to identify you.
    </p>

  </div>

</div>
